<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3b82f6">
    <title>Mis Favoritos — ModStore</title>
    <link rel="icon" type="image/png" href="assets/icono.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fasfqeawrdfq3wer3w/stark-mklsdklamdklm@main/favoritos.css">
    <script>(function(){const a={blue:{p:'#3b82f6',s:'#1d4ed8',ac:'#60a5fa',g:'rgba(59,130,246,0.4)',rgb:'59,130,246'},red:{p:'#ef4444',s:'#b91c1c',ac:'#f87171',g:'rgba(239,68,68,0.4)',rgb:'239,68,68'},green:{p:'#10b981',s:'#047857',ac:'#34d399',g:'rgba(16,185,129,0.4)',rgb:'16,185,129'}};const b={black:{bp:'#000000',bs:'#0a0a0a',bt:'#1a1a1a',br:'#1f2937'},gray:{bp:'#111111',bs:'#1c1c1e',bt:'#2c2c2e',br:'#3a3a3c'},dark:{bp:'#0d1117',bs:'#161b22',bt:'#21262d',br:'#30363d'}};const t=a[localStorage.getItem('appTheme')]||a.blue;const bg=b[localStorage.getItem('appBgTheme')]||b.black;const r=document.documentElement;r.style.setProperty('--primary',t.p);r.style.setProperty('--secondary',t.s);r.style.setProperty('--accent',t.ac);r.style.setProperty('--glow',t.g);r.style.setProperty('--primary-rgb',t.rgb);r.style.setProperty('--bg-primary',bg.bp);r.style.setProperty('--bg-secondary',bg.bs);r.style.setProperty('--bg-tertiary',bg.bt);r.style.setProperty('--border',bg.br);})();</script>
</head>
<body>

    <header class="fav-header">
        <button class="back-btn" onclick="goBack()">
            <img src="https://cdn.jsdelivr.net/gh/fasfqeawrdfq3wer3w/stark-mklsdklamdklm@main/iconos/back.svg" alt="Volver">
        </button>
        <span class="fav-title">Mis Favoritos</span>
        <button class="clear-btn" onclick="confirmClear()" id="btnClear" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
    </header>

    <main class="fav-content">
        <div class="apps-grid" id="favoritesGrid"></div>
        <div class="empty-state" id="emptyFavorites">
            <div class="empty-icon">⭐</div>
            <p>No tienes favoritos aún</p>
            <p class="empty-subtitle">Agrega apps a favoritos desde su página de detalle</p>
        </div>
    </main>

    <!-- Modal confirmar limpiar -->
    <div id="modalClear" class="confirm-modal">
        <div class="confirm-modal-content">
            <div class="confirm-icon">⭐</div>
            <h3>Limpiar favoritos</h3>
            <p>¿Estás seguro? Se eliminarán todos tus favoritos. Esta acción no se puede deshacer.</p>
            <div class="confirm-actions">
                <button class="confirm-btn cancel" onclick="closeModal('modalClear')">Cancelar</button>
                <button class="confirm-btn danger" onclick="clearAll()">Eliminar</button>
            </div>
        </div>
    </div>

    <!-- Modal confirmar eliminar uno -->
    <div id="modalRemove" class="confirm-modal">
        <div class="confirm-modal-content">
            <div class="confirm-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="40" height="40"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></div>
            <h3>Quitar de favoritos</h3>
            <p>¿Quieres quitar <strong id="removeAppName"></strong> de tus favoritos?</p>
            <div class="confirm-actions">
                <button class="confirm-btn cancel" onclick="closeModal('modalRemove')">Cancelar</button>
                <button class="confirm-btn danger" onclick="confirmRemove()">Quitar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/fasfqeawrdfq3wer3w/stark-mklsdklamdklm@main/favoritos.js"></script>
    <script>
        function goBack() {
            // Guardar en sessionStorage que estamos saliendo de favoritos
            sessionStorage.setItem('leavingFavorites', 'true');
            window.history.back();
        }

        // Detectar si volvimos a favoritos.html desde favoritos.html
        window.addEventListener('pageshow', function() {
            if (sessionStorage.getItem('leavingFavorites') === 'true') {
                sessionStorage.removeItem('leavingFavorites');
                // Si volvimos a favoritos, seguir retrocediendo
                if (document.referrer.includes('favoritos.html') || window.location.href.includes('favoritos.html')) {
                    setTimeout(function() {
                        window.history.back();
                    }, 10);
                }
            }
        });
    </script>

</body>
</html>
