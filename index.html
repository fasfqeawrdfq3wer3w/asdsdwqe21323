    <script>
        // Error handling wrapper for CDN scripts
        (function() {
            const originalReplaceState = history.replaceState;
            history.replaceState = function(state, title, url) {
                try {
                    if (url && url.toString().startsWith('blob:')) {
                        console.warn('Blocked replaceState on blob URL:', url);
                        return;
                    }
                    return originalReplaceState.apply(this, arguments);
                } catch (e) {
                    console.warn('replaceState error caught:', e.message);
                }
            };
            try {
                const locationProto = Object.getPrototypeOf(window.location);
                const originalLocationDescriptor = Object.getOwnPropertyDescriptor(locationProto, 'href');
                if (originalLocationDescriptor && originalLocationDescriptor.set) {
                    Object.defineProperty(locationProto, 'href', {
                        set: function(url) {
                            if (!url || url === '') {
                                console.warn('Blocked navigation to empty URL');
                                return;
                            }
                            originalLocationDescriptor.set.call(this, url);
                        },
                        get: originalLocationDescriptor.get,
                        enumerable: true,
                        configurable: true
                    });
                }
            } catch (e) {
                console.warn('Could not wrap location.href:', e.message);
            }
        })();
    </script>
